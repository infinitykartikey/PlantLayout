<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1500 800"
     xmlns="http://www.w3.org/2000/svg"
     preserveAspectRatio="xMidYMid meet"
     style="width:100%; height:auto;">

  <!-- ====== Effects ====== -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.18"/>
    </filter>

    <!-- Exit Icon -->
    <g id="exitIcon">
      <rect x="0" y="0" width="20" height="28" fill="white" stroke="green" stroke-width="3" rx="2"/>
      <circle cx="15" cy="14" r="2" fill="green"/>
    </g>
  </defs>

  <!-- ====== Styles ====== -->
  <style>
    .path { stroke:#6b7280; stroke-width:4; stroke-dasharray:10 8; fill:none; }
    .legendText { font-size:16px; fill:#111827; font-weight:600; }
    .deptLabel { font-size:20px; font-weight:700; fill:#111827; }
    .deptIcon { opacity:0.2; }
  </style>

  <!-- ====== Plant boundary ====== -->
  <rect x="20" y="20" width="1460" height="760"
        fill="#f9fafb" stroke="#9ca3af" stroke-width="3" rx="12"/>

  <!-- ====== Main corridor ring ====== -->
  <rect x="100" y="100" width="1000" height="600"
        fill="none" stroke="#374151" stroke-width="8" rx="30"/>

  <!-- ====== Departments ====== -->
  <!-- Blast Furnace -->
  <g filter="url(#shadow)">
    <rect x="140" y="140" width="300" height="200"
          fill="#dbeafe" stroke="#3b82f6" stroke-width="3" rx="10"/>
    <!-- Furnace tower icon -->
    <rect class="deptIcon" x="250" y="170" width="80" height="120" fill="black"/>
    <rect class="deptIcon" x="270" y="150" width="40" height="30" fill="black"/>
    <circle class="deptIcon" cx="290" cy="145" r="12" fill="gray"/>
    <text x="290" y="220" text-anchor="middle" class="deptLabel">Blast Furnace</text>
    <use href="#exitIcon" x="435" y="220"/>
    <use href="#exitIcon" x="275" y="330"/>
  </g>

  <!-- Steelmaking (BOF) -->
  <g filter="url(#shadow)">
    <rect x="140" y="460" width="300" height="200"
          fill="#fef3c7" stroke="#f59e0b" stroke-width="3" rx="10"/>
    <!-- Ladle pouring icon -->
    <rect class="deptIcon" x="250" y="490" width="80" height="60" fill="black" rx="10"/>
    <path class="deptIcon" d="M330 490 Q350 520 330 540 L300 540" fill="black"/>
    <circle class="deptIcon" cx="330" cy="530" r="6" fill="orange"/>
    <text x="290" y="560" text-anchor="middle" class="deptLabel">Steelmaking (BOF)</text>
    <use href="#exitIcon" x="435" y="540"/>
    <use href="#exitIcon" x="275" y="460"/>
  </g>

  <!-- Rolling Mill -->
  <g filter="url(#shadow)">
    <rect x="760" y="140" width="300" height="200"
          fill="#e0f2fe" stroke="#0284c7" stroke-width="3" rx="10"/>
    <!-- Rollers icon -->
    <circle class="deptIcon" cx="830" cy="230" r="30" stroke="black" stroke-width="12" fill="none"/>
    <circle class="deptIcon" cx="910" cy="230" r="30" stroke="black" stroke-width="12" fill="none"/>
    <rect class="deptIcon" x="830" y="220" width="80" height="20" fill="black"/>
    <text x="910" y="220" text-anchor="middle" class="deptLabel">Rolling Mill</text>
    <use href="#exitIcon" x="760" y="220"/>
    <use href="#exitIcon" x="890" y="330"/>
  </g>

  <!-- Maintenance & Utilities -->
  <g filter="url(#shadow)">
    <rect x="760" y="460" width="300" height="200"
          fill="#dcfce7" stroke="#22c55e" stroke-width="3" rx="10"/>
    <!-- Wrench + gear -->
    <circle class="deptIcon" cx="830" cy="540" r="25" stroke="black" stroke-width="8" fill="none"/>
    <rect class="deptIcon" x="850" y="560" width="60" height="12" rx="3" fill="black"/>
    <path class="deptIcon" d="M860 565 L870 580 L855 590 L845 575 Z" fill="black"/>
    <text x="910" y="560" text-anchor="middle" class="deptLabel">Maintenance & Utilities</text>
    <use href="#exitIcon" x="760" y="540"/>
    <use href="#exitIcon" x="890" y="460"/>
  </g>

  <!-- Power Plant -->
  <g filter="url(#shadow)">
    <rect x="460" y="300" width="280" height="200"
          fill="#fee2e2" stroke="#ef4444" stroke-width="3" rx="10"/>
    <!-- Power bolt in circle -->
    <circle class="deptIcon" cx="600" cy="400" r="50" stroke="black" stroke-width="10" fill="none"/>
    <polygon class="deptIcon" points="590,350 615,390 595,390 620,450 580,400 600,400"
             fill="gold"/>
    <text x="600" y="400" text-anchor="middle" class="deptLabel">Power Plant</text>
    <use href="#exitIcon" x="710" y="380"/>
    <use href="#exitIcon" x="460" y="380"/>
  </g>

  <!-- ====== Plant-wide exits ====== -->
  <g>
    <use href="#exitIcon" x="50" y="385"/>
    <text x="65" y="370" text-anchor="middle" font-size="14" fill="#111827">West Exit</text>
    <use href="#exitIcon" x="1120" y="385"/>
    <text x="1135" y="370" text-anchor="middle" font-size="14" fill="#111827">East Exit</text>
    <use href="#exitIcon" x="595" y="725"/>
    <text x="610" y="710" text-anchor="middle" font-size="14" fill="#111827">South Exit</text>
  </g>

  <!-- ====== Walking paths ====== -->
  <path class="path" d="M460,235 L760,235"/> <!-- BF -> RM -->
  <path class="path" d="M460,555 L760,555"/> <!-- BOF -> Maint -->
  <path class="path" d="M285,330 L285,460"/> <!-- BF -> BOF -->
  <path class="path" d="M905,330 L905,460"/> <!-- RM -> Maint -->
  <path class="path" d="M740,395 L1100,395"/> <!-- PP -> East -->
  <path class="path" d="M460,395 L100,395"/>  <!-- PP -> West -->
  <path class="path" d="M610,720 L610,700"/>
  <path class="path" d="M610,720 L610,555"/>

  <!-- ====== Legend (no box) ====== -->
  <g>
    <text x="1300" y="160" text-anchor="middle" class="legendText">Legend</text>
    <rect x="1220" y="190" width="20" height="20" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="1250" y="205" class="legendText">Blast Furnace</text>
    <rect x="1220" y="220" width="20" height="20" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="1250" y="235" class="legendText">Steelmaking (BOF)</text>
    <rect x="1220" y="250" width="20" height="20" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="1250" y="265" class="legendText">Rolling Mill</text>
    <rect x="1220" y="280" width="20" height="20" fill="#dcfce7" stroke="#22c55e"/>
    <text x="1250" y="295" class="legendText">Maintenance & Utilities</text>
    <rect x="1220" y="310" width="20" height="20" fill="#fee2e2" stroke="#ef4444"/>
    <text x="1250" y="325" class="legendText">Power Plant</text>
    <use href="#exitIcon" x="1220" y="340"/>
    <text x="1250" y="355" class="legendText">Exit</text>
    <line x1="1220" y1="380" x2="1240" y2="380" class="path"/>
    <text x="1250" y="385" class="legendText">Walking Path</text>
  </g>
</svg>
